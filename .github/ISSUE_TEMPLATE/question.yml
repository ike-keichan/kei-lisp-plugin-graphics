name: Question
description: Ask a question about usage or behavior
title: 'question: '
labels: ['question']
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the reference docs:
        [docs/graphics.md](https://github.com/ike-keichan/kei-lisp-plugin-graphics/blob/main/docs/graphics.md)
        and [docs/api.md](https://github.com/ike-keichan/kei-lisp-plugin-graphics/blob/main/docs/api.md).
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What you tried
      description: Code or Lisp snippets you have already tried, and what happened.
    validations:
      required: false
  - type: input
    id: versions
    attributes:
      label: Versions
      placeholder: e.g. kei-lisp-plugin-graphics 1.1.0 / kei-lisp 2.2.0
    validations:
      required: false
