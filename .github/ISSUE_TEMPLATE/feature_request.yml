# cspell:ignore gfocus -- hypothetical function name used in the placeholder below
name: Feature request
description: Suggest a new function or an improvement
title: 'feat: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        A clear problem statement helps us evaluate the proposal.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that is currently hard or impossible?
      placeholder: I want to draw ... from Lisp, but ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What would you like to see? For new drawing functions, the corresponding
        Canvas API (e.g. `ctx.drawFocusIfNeeded`) and a sketch of the Lisp signature help.
      placeholder: |
        Add `gfocus-ring` mapping to `ctx.drawFocusIfNeeded`:
        (gfocus-ring element-id)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative designs you have considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
