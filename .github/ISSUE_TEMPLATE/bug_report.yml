name: Bug report
description: Report something that does not work as documented
title: 'bug: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much of the form below as you can.
  - type: input
    id: plugin-version
    attributes:
      label: kei-lisp-plugin-graphics version
      description: Output of `npm ls kei-lisp-plugin-graphics`, or the version in your lockfile.
      placeholder: e.g. 4.0.0
    validations:
      required: true
  - type: input
    id: kei-lisp-version
    attributes:
      label: kei-lisp version
      placeholder: e.g. 3.0.1
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node.js version (for build issues) or browser and version (for runtime issues).
      placeholder: e.g. Node.js 24.14.0 / Chrome 138
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest Lisp snippet (and TypeScript setup, if relevant) that reproduces the issue.
      render: lisp
      placeholder: |
        (gopen)
        (gfill-rect 10 10 100 50)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the signaled error message, or any diagnostic the plugin wrote to stderr.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (screenshots, canvas type, bundler, etc.).
    validations:
      required: false
