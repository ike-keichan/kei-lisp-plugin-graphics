name: Deploy Pages

# Runs after the Release workflow finishes (instead of racing it on the same
# main push) so the site never goes live for a version whose release failed.
# Docs-only pushes still deploy: Release completes successfully as a no-op.
on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Build and deploy are separate jobs so that a transient Pages failure can be
# recovered with "Re-run failed jobs" — rerunning only the deploy job reuses
# the already-uploaded artifact instead of uploading a conflicting duplicate.
jobs:
  build:
    name: Build demo + API docs
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build the live demo and the API docs
        run: |
          pnpm exec vite build examples --base=./ --outDir dist-pages
          pnpm doc
          mkdir -p site
          cp -R examples/dist-pages/. site/
          cp -R docs/typedoc site/api
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
