name: Deploy Pages

# Runs after the Release workflow finishes (instead of racing it on the same
# main push) so the site never goes live for a version whose release failed.
# Docs-only pushes still deploy: Release completes successfully as a no-op.
on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Build and deploy are separate jobs so that a transient Pages failure can be
# recovered with "Re-run failed jobs" — rerunning only the deploy job reuses
# the already-uploaded artifact instead of uploading a conflicting duplicate.
jobs:
  build:
    name: Build demo + API docs
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Deploy the commit whose Release run just succeeded; without this,
          # a concurrent push to main could go live before its own Release
          # finishes. Falls back to the branch head for workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build the live demo and the API docs
        run: |
          pnpm exec vite build examples --base=./ --outDir dist-pages
          pnpm doc
          mkdir -p site
          cp -R examples/dist-pages/. site/
          cp -R docs/typedoc site/api
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
