name: Release

on:
  push:
    branches:
      - main

# Prevent overlapping release runs (e.g. rapid main pushes) but never cancel an in-flight one.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # for tag push + GitHub Release creation
  id-token: write # for npm Trusted Publishing (OIDC auth) + provenance attestation

jobs:
  check:
    name: Check if release is needed
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.decide.outputs.should-release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # tags must be available for the existence check

      - name: Decide based on package.json version vs. existing tags
        id: decide
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists — no release."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$version does not exist — will release."
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Publish to npm and create GitHub Release
    needs: check
    if: needs.check.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          # No registry-url here: Trusted Publishing authenticates via OIDC,
          # so we deliberately avoid generating an .npmrc with an empty NODE_AUTH_TOKEN.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check
        run: pnpm check

      - name: Test
        run: pnpm test

      # Both steps below are idempotent so that a partially failed run can be
      # recovered with "Re-run failed jobs" (e.g. the publish succeeded but
      # the tag push failed) instead of hard-failing on the duplicate.
      # npm view exits non-zero (E404) for a missing version on npm >= 8.13,
      # which .node-version guarantees here; a transient registry failure
      # falls through to publish, where the registry rejects duplicates.
      - name: Publish to npm
        run: |
          version="${{ needs.check.outputs.version }}"
          if npm view "kei-lisp-plugin-graphics@$version" version >/dev/null 2>&1; then
            echo "$version is already on npm — skipping publish."
          else
            pnpm publish --provenance --access public --no-git-checks
          fi

      # Checked against origin (ls-remote) because this job's shallow
      # checkout does not fetch tags, so a local rev-parse can never see one.
      - name: Create and push tag
        run: |
          version="${{ needs.check.outputs.version }}"
          if git ls-remote --exit-code origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "Tag v$version already exists on origin — skipping."
          else
            git tag "v$version"
            git push origin "v$version"
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          version="${{ needs.check.outputs.version }}"
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") { flag = 1; next }
            /^## \[/ { if (flag) exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          echo "Extracted $(wc -l < release-notes.md) lines of notes for $version"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v${{ needs.check.outputs.version }}
          body_path: release-notes.md
          # Auto-generated PR list is appended after the CHANGELOG body, and
          # doubles as a fallback when the CHANGELOG section is empty.
          generate_release_notes: true
